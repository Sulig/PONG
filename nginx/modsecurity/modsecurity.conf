# ModSecurity v3 Configuration
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecResponseBodyMimeType text/plain text/html text/xml
SecResponseBodyLimit 524288

# Data directory
SecDataDir /var/log/nginx/modsec/

# Logging configuration
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/nginx/modsec_audit.log

# Limit configuration
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Allow REST API methods (PATCH, PUT, DELETE) in addition to defaults
SecAction \
    "id:900200,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

# Include OWASP Core Rule Set
Include /etc/nginx/crs/crs-setup.conf
Include /etc/nginx/modsecurity/crs-rules.conf

# --- Custom rules to handle false positives for REST API ---

# Allow JSON in body for REST APIs
SecRule REQUEST_HEADERS:Content-Type "@beginsWith application/json" \
    "id:1000,\
    phase:1,\
    pass,\
    nolog,\
    ctl:requestBodyProcessor=JSON"

# Auth endpoints: exclude password fields from SQLi checks (passwords may
# contain quotes, semicolons, etc.) but keep inspection on all other args
SecRule REQUEST_URI "@beginsWith /api/v1/auth" \
    "id:1001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveTargetById=942100;ARGS:password,\
    ctl:ruleRemoveTargetById=942110;ARGS:password,\
    ctl:ruleRemoveTargetById=942100;ARGS:newPassword,\
    ctl:ruleRemoveTargetById=942110;ARGS:newPassword,\
    ctl:ruleRemoveTargetById=942100;ARGS:oldPassword,\
    ctl:ruleRemoveTargetById=942110;ARGS:oldPassword,\
    ctl:ruleRemoveById=930120"

# Profile password change: same exclusion for password fields
SecRule REQUEST_URI "@beginsWith /api/v1/profile/password" \
    "id:1003,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveTargetById=942100;ARGS:oldPassword,\
    ctl:ruleRemoveTargetById=942110;ARGS:oldPassword,\
    ctl:ruleRemoveTargetById=942100;ARGS:newPassword,\
    ctl:ruleRemoveTargetById=942110;ARGS:newPassword"

# WebSocket handshake: minimal exceptions for upgrade negotiation
SecRule REQUEST_HEADERS:Upgrade "@streq websocket" \
    "id:1002,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=942100,\
    ctl:ruleRemoveById=942200"
